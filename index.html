<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carcinero's Dark Blue Void</title>
    <style>
        /* Основной фон и цвета */
        body { 
            background-color: #000814; /* Глубокий темно-синий */
            color: #00a2ff; /* Яркий голубой для текста */
            font-family: "Courier New", monospace; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Верхняя панель (как на NTS) */
        .top-player-bar {
            width: 100%;
            height: 50px;
            background: #001d3d; /* Темно-синяя плашка */
            border-bottom: 2px solid #00a2ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .player-info { font-size: 12px; font-weight: bold; color: #fff; text-transform: uppercase; }

        audio { 
            height: 30px; 
            filter: invert(1) hue-rotate(180deg) brightness(1.5); /* Красим стандартный плеер в сине-белый */
        }

        /* Основной контейнер профиля */
        .profile-box { 
            width: 750px; 
            margin-top: 100px; /* Отступ от верхней панели */
            border: 2px solid #00a2ff; 
            background: rgba(0, 29, 61, 0.8); 
            padding: 30px; 
            box-shadow: 0 0 40px rgba(0, 162, 255, 0.2);
        }

        h1 { text-align: center; color: #fff; letter-spacing: 8px; margin-bottom: 25px; border-bottom: 1px solid #00a2ff; padding-bottom: 10px; }
        
        .main-info { display: flex; gap: 30px; }
        .user-pic { width: 250px; height: 250px; border: 1px solid #00a2ff; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-pic img { width: 100%; height: 100%; object-fit: cover; }
        
        .details h3 { color: #fff; border-bottom: 1px solid #fff; display: inline-block; }
        p { font-size: 16px; margin: 10px 0; }
        
        /* Сетка для контента (чтобы не было пусто) */
        .content-grid { margin-top: 20px; border-top: 1px dashed #00a2ff; padding-top: 20px; }
    </style>
</head>
<body>

<div class="top-player-bar">
    <div class="player-info">
        NOW PLAYING: skinwalkerog.mp3
    </div>
    <audio controls>
        <source src="skinwalkerog.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</div>

<div class="profile-box">
    <h1>CARCINERO</h1>
    
    <div class="main-info">
        <div class="user-pic">
            <img src="https://i.pinimg.com/originals/f4/d2/96/f4d2961b65637a7b839711696f7436b8.gif">
        </div>
        <div class="details">
            <h3>INFO:</h3>
            <p><b>USER:</b> Carcinero</p>
            <p><b>SONG:</b> Skinwalker</p>
            <p><b>STATUS:</b> DEEP NAVY BLUE VOID</p>
            <p><b>SYSTEM:</b> ONLINE / 2026</p>
        </div>
    </div>

    <div class="content-grid">
        <p><i>"The internet is what we make it."</i></p>
        </div>
</div>

</body>
</html>
