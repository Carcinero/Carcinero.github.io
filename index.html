<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carcinero's Dark Blue</title>
    <style>
        body { 
            background-color: #00030a; 
            color: #0044cc; 
            font-family: "Courier New", monospace; 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .profile-box { 
            width: 750px; border: 2px solid #0033aa; background: #000814; padding: 20px; margin-top: 50px;
        }
        h1 { text-align: center; color: #0044cc; letter-spacing: 5px; }
        .status { border: 1px solid #0033aa; padding: 8px; margin-bottom: 20px; text-align: center; }
        .info-section { display: flex; gap: 30px; border-bottom: 1px solid #002288; padding-bottom: 20px; }
        .pic-box { width: 250px; height: 250px; border: 1px solid #0033aa; background: #000; display: flex; align-items: center; justify-content: center; }
        .top8 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .friend { border: 1px solid #002288; padding: 5px; text-align: center; font-size: 11px; }
        .friend-pic { height: 80px; background: #000; border: 1px solid #002288; margin-bottom: 5px; }
        .player { margin-top: 20px; text-align: center; border-top: 1px dashed #002288; padding-top: 15px; }
    </style>
</head>
<body>

<div class="profile-box">
    <h1>CARCINERO</h1>
    <div class="status">SYSTEM: ONLINE / COLOR: DARK BLUE</div>
    
    <div class="info-section">
        <div class="pic-box">[VOID]</div>
        <div>
            <h3>INFO:</h3>
            <p><b>USER:</b> Carcinero</p>
            <p><b>SONG:</b> Skinwalker</p>
        </div>
    </div>

    <h3>TOP 8 FRIENDS:</h3>
    <div class="top8">
        <div class="friend"><div class="friend-pic"></div>Friend 1</div>
        <div class="friend"><div class="friend-pic"></div>Friend 2</div>
        <div class="friend"><div class="friend-pic"></div>Friend 3</div>
        <div class="friend"><div class="friend-pic"></div>Friend 4</div>
    </div>

    <div class="player">
        <iframe width="100%" height="120" src="https://www.youtube.com/embed/Tsg9SYMBvng?color=white&theme=dark" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
</div>

</body>
</html>
