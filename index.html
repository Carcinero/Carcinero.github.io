<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Carcinero's Dark Blue Void</title>
    <style>
        body { 
            background-color: #00030a; /* Почти черный */
            color: #0055ff; /* Глубокий синий без неона */
            font-family: "Courier New", monospace; 
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .profile-box { 
            width: 750px; 
            border: 2px solid #0044cc; /* Тонкая темно-синяя рамка */
            background: #000814; 
            padding: 20px; 
            margin-top: 50px;
            /* Сияние (box-shadow) удалено */
        }
        h1 { text-align: center; color: #0055ff; letter-spacing: 5px; text-transform: uppercase; }
        
        h3, p, b { color: #0055ff; } 
        
        .status { 
            border: 1px solid #0055ff; 
            color: #0055ff; 
            padding: 8px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            width: 100%; 
            text-align: center; 
            box-sizing: border-box; 
        }
        
        .info-section { display: flex; gap: 30px; border-bottom: 1px solid #0033aa; padding-bottom: 20px; }
        .pic-box { width: 250px; height: 250px; border: 1px solid #0044cc; background: #000; display: flex; align-items: center; justify-content: center; }
        
        .top8 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .friend { border: 1px solid #0033aa; padding: 5px; text-align: center; font-size: 11px; color: #0055ff; }
        .friend-pic { height: 80px; background: #000510; margin-bottom: 5px; border: 1px solid #0033aa; }
